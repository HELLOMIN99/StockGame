<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTS 시뮬레이터 Pro</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="stock.js"></script>
    <style>
        /* ===== 기본 리셋 ===== */
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 8px;
            margin: 0;
        }

        /* ===== 게임보드 ===== */
        .game-board {
            background-color: white;
            border: 1px solid #ddd;
            padding: 12px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* ===== 제목 ===== */
        h1 {
            color: #2c3e50;
            margin: 6px 0 10px;
            font-size: clamp(15px, 3.5vw, 24px);
            line-height: 1.3;
        }

        /* ===== 도구 버튼 그룹 ===== */
        .tool-group {
            background: #f8f9fa;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }
        .btn-tool {
            padding: 7px 12px;
            font-size: clamp(11px, 2.5vw, 14px);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            flex: 1 1 auto;
            min-width: 90px;
            max-width: 160px;
        }

        /* ===== 지표 메뉴 ===== */
        .indicator-menu {
            margin-bottom: 8px;
            display: flex;
            gap: 4px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-ind {
            padding: 5px 9px;
            font-size: clamp(10px, 2.2vw, 12px);
            background: #fff;
            border: 1px solid #ccc;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn-ind.on { background: #f39c12; color: white; border-color: #e67e22; }

        /* ===== 타임프레임 ===== */
        .tf-container {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .btn-tf {
            background: #bdc3c7;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: clamp(12px, 2.8vw, 15px);
            flex: 1 1 0;
            max-width: 100px;
        }
        .btn-tf.active { background: #2c3e50; color: white; }

        /* ===== 차트 ===== */
        #chart {
            width: 100%;
            height: 55vw;       /* 모바일: 화면 너비의 55% */
            min-height: 280px;
            max-height: 850px;
            background-color: #fff;
        }

        /* ===== 대시보드 ===== */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            background: #2c3e50;
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .dashboard p {
            font-size: clamp(13px, 3.2vw, 22px);
            font-weight: 900;
            margin: 0;
            padding: 6px 4px;
            background: rgba(255,255,255,0.07);
            border-radius: 6px;
            line-height: 1.4;
        }
        .dashboard span { color: #f1c40f; }

        /* ===== 매매 컨트롤 ===== */
        .trade-controls {
            margin-top: 12px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            align-items: center;
        }
        .amount-row {
            grid-column: 1 / -1;   /* 수량 입력은 전체 너비 */
            display: flex;
            justify-content: center;
        }
        .amount-input {
            padding: 10px;
            font-size: clamp(16px, 3.5vw, 20px);
            width: 120px;
            text-align: center;
            border: 2px solid #3498db;
            border-radius: 5px;
            font-weight: bold;
        }
        button.trade {
            padding: 12px 8px;
            font-size: clamp(13px, 3vw, 17px);
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            width: 100%;
        }
        /* 1일/7일 버튼: 2열 전체 */
        button.trade.full { grid-column: 1 / -1; }

        /* ===== 데스크탑 (768px 이상) ===== */
        @media (min-width: 768px) {
            .game-board { padding: 20px; }
            h1 { font-size: 22px; margin: 10px 0; }
            #chart { height: 600px; }
            .dashboard {
                grid-template-columns: repeat(4, 1fr);
                padding: 20px;
            }
            .dashboard p { font-size: 20px; }
            .trade-controls {
                grid-template-columns: repeat(6, auto);
                justify-content: center;
            }
            .amount-row { grid-column: auto; }
            button.trade.full { grid-column: auto; }
            button.trade { width: auto; padding: 13px 20px; font-size: 16px; }
            .amount-input { font-size: 18px; }
            .btn-tool { flex: 0 1 auto; }
        }

        /* ===== 대형 화면 (1200px 이상) ===== */
        @media (min-width: 1200px) {
            #chart { height: 850px; }
            .dashboard p { font-size: 26px; }
            button.trade { font-size: 18px; padding: 15px 25px; }
        }
    </style>
</head>
<body>
    <div class="game-board">
        <h1>📊 주식 시뮬레이터 (HTS 전문가 완성형)</h1>

        <div class="tool-group">
            <button class="btn-tool" style="background:#e67e22; color:white;" onclick="undoLastShape()">↩️ 선 취소</button>
            <button class="btn-tool" style="background:#6c757d; color:white;" onclick="clearShapes()">🧹 선 지우기</button>
            <button class="btn-tool" style="background:#34495e; color:white;" onclick="onResetGame()">🆕 리셋</button>
        </div>

        <div class="indicator-menu">
            <button class="btn-ind on" onclick="toggleInd('ma', this)">이평선</button>
            <button class="btn-ind" onclick="toggleInd('bb', this)">볼린저</button>
            <button class="btn-ind" onclick="toggleInd('ichimoku', this)">일목</button>
            <button class="btn-ind" onclick="toggleInd('vol', this)">거래량</button>
            <button class="btn-ind" onclick="toggleInd('macd', this)">MACD</button>
            <button class="btn-ind" onclick="toggleInd('stoch', this)">스토캐스틱</button>
            <button class="btn-ind" onclick="toggleInd('rsi', this)">RSI</button>
            <button class="btn-ind" onclick="toggleInd('cci', this)">CCI</button>
            <button class="btn-ind" onclick="toggleInd('adx', this)">DMI/ADX</button>
        </div>

        <div class="tf-container">
            <button class="btn-tf active" id="daily"   onclick="changeTF('daily')">일봉</button>
            <button class="btn-tf"        id="monthly" onclick="changeTF('monthly')">월봉</button>
            <button class="btn-tf"        id="yearly"  onclick="changeTF('yearly')">년봉</button>
        </div>

        <div id="chart"></div>

        <div class="dashboard">
            <p>💰 현금<br><span id="money">10000</span></p>
            <p>🏷️ 평단가<br><span id="avg_price">0</span></p>
            <p>📦 주식<br><span id="shares">0</span>주</p>
            <p>🏆 자산<br><span id="total_asset">10000</span></p>
        </div>

        <div class="trade-controls">
            <div class="amount-row">
                <input type="number" id="trade-amount" class="amount-input" value="1" min="1">
            </div>
            <button class="trade" style="background:#2ecc71;"  onclick="trade('buy')">매수</button>
            <button class="trade" style="background:#e74c3c;"  onclick="trade('sell')">매도</button>
            <button class="trade" style="background:#27ae60;"  onclick="tradeAll('buy')">전액매수</button>
            <button class="trade" style="background:#c0392b;"  onclick="tradeAll('sell')">전액매도</button>
            <button class="trade full" style="background:#3498db;" onclick="onNextDay(1)">1일 넘기기</button>
            <button class="trade full" style="background:#2980b9;" onclick="onNextDay(7)">7일 넘기기</button>
        </div>
    </div>

    <script>
        const isMobile = () => window.innerWidth < 768;

        let currentTF = 'daily';
        let showInd = { ma: true, bb: false, ichimoku: false, vol: false, macd: false, stoch: false, rsi: false, cci: false, adx: false };
        let lastData = null;

        function toggleInd(name, btn) { showInd[name] = !showInd[name]; btn.classList.toggle('on'); fetchState(); }
        function changeTF(tf) {
            currentTF = tf;
            document.querySelectorAll('.btn-tf').forEach(b => b.classList.remove('active'));
            document.getElementById(tf).classList.add('active');
            fetchState();
        }

        function fetchState() { draw(getState(currentTF)); }

        function onResetGame() {
            if (confirm("초기화하시겠습니까?")) { resetGame(); fetchState(); }
        }

        function undoLastShape() {
            const c = document.getElementById('chart');
            if (c.layout && c.layout.shapes) Plotly.relayout('chart', { shapes: c.layout.shapes.slice(0, -1) });
        }
        function clearShapes() { Plotly.relayout('chart', { shapes: [] }); }

        function trade(act) {
            const amt = parseInt(document.getElementById('trade-amount').value);
            const res = act === 'buy' ? buyStock(amt) : sellStock(amt);
            if (!res.success) alert(res.message);
            fetchState();
        }

        function tradeAll(act) {
            if (!gameState) return;
            const amt = act === 'buy' ? Math.floor(gameState.money / gameState.price) : gameState.shares;
            if (amt <= 0) return;
            const res = act === 'buy' ? buyStock(amt) : sellStock(amt);
            if (!res.success) alert(res.message);
            fetchState();
        }

        function onNextDay(days) { nextDay(days); fetchState(); }

        function getChartHeight() {
            const w = window.innerWidth;
            if (w < 768) return Math.max(280, Math.min(w * 0.55, 500));
            if (w < 1200) return 600;
            return 850;
        }

        function draw(data) {
            lastData = data;
            const hist = data.display_history;
            const x = hist.map(h => h.label);
            const traces = [];
            const currentPrice = data.price;
            const mobile = isMobile();

            traces.push({
                x, open: hist.map(h => h.open), high: hist.map(h => h.high),
                low: hist.map(h => h.low), close: hist.map(h => h.close),
                type: 'candlestick', name: 'Price',
                increasing: { line: { color: 'red' } },
                decreasing: { line: { color: 'blue' } },
                yaxis: 'y'
            });

            if (showInd.ma) {
                traces.push({ x, y: hist.map(h => h.ma5),  name: 'MA5',  line: { color: 'orange', width: 1 }, yaxis: 'y' });
                traces.push({ x, y: hist.map(h => h.ma20), name: 'MA20', line: { color: 'green',  width: 1 }, yaxis: 'y' });
            }
            if (showInd.bb) {
                traces.push({ x, y: hist.map(h => h.bb_u), name: 'BB U', line: { color: 'gray', dash: 'dash' }, yaxis: 'y' });
                traces.push({ x, y: hist.map(h => h.bb_l), name: 'BB L', line: { color: 'gray', dash: 'dash' }, yaxis: 'y' });
            }
            if (showInd.ichimoku) {
                traces.push({ x, y: hist.map(h => h.ten), name: 'Tenkan', line: { color: 'pink'  }, yaxis: 'y' });
                traces.push({ x, y: hist.map(h => h.kij), name: 'Kijun',  line: { color: 'brown' }, yaxis: 'y' });
                traces.push({ x, y: hist.map(h => h.sb),  name: 'Cloud',  fill: 'tonexty', fillcolor: 'rgba(173,216,230,0.2)', line: { width: 0 }, yaxis: 'y' });
            }

            const subOrder = ['vol', 'macd', 'stoch', 'rsi', 'cci', 'adx'];
            const activeSubs = subOrder.filter(s => showInd[s]);
            const subCount = activeSubs.length;
            const subH = mobile ? 0.10 : 0.08;
            const mainB = subCount === 0 ? 0 : subH * subCount + 0.05;

            const viewCount = currentTF === 'daily' ? (mobile ? 30 : 60)
                            : currentTF === 'monthly' ? (mobile ? 12 : 24)
                            : (mobile ? 6 : 12);

            const existingShapes = (document.getElementById('chart').layout && document.getElementById('chart').layout.shapes)
                ? [...document.getElementById('chart').layout.shapes.filter(s => s.editable)] : [];

            existingShapes.push({
                type: 'line', xref: 'paper', x0: 0, x1: 1,
                yref: 'y', y0: currentPrice, y1: currentPrice,
                line: { color: 'black', width: 2, dash: 'dash' }, editable: false
            });
            if (data.shares > 0) {
                existingShapes.push({
                    type: 'line', xref: 'paper', x0: 0, x1: 1,
                    yref: 'y', y0: data.avg_price, y1: data.avg_price,
                    line: { color: 'red', width: 2 }, editable: false
                });
            }

            const annotations = [{
                xref: 'paper', x: 1.02, yref: 'y', y: currentPrice,
                text: `$${currentPrice}`, showarrow: false,
                font: { color: 'black', size: mobile ? 10 : 12 }
            }];
            if (data.shares > 0) {
                annotations.push({
                    xref: 'paper', x: 1.02, yref: 'y', y: data.avg_price,
                    text: `평단$${Math.floor(data.avg_price)}`, showarrow: false,
                    font: { color: 'red', size: mobile ? 10 : 12 }, bgcolor: 'white'
                });
            }

            const chartHeight = getChartHeight();
            const layout = {
                grid: { rows: subCount + 1, columns: 1, roworder: 'top to bottom' },
                yaxis: { domain: [mainB, 1], side: 'right', autorange: true, fixedrange: false },
                xaxis: {
                    rangeslider: { visible: !mobile, thickness: 0.03, yaxis: { rangemode: 'fixed' } },
                    type: 'category',
                    range: [x.length - viewCount, x.length - 1],
                    tickfont: { size: mobile ? 9 : 11 }
                },
                margin: mobile
                    ? { t: 20, b: 20, l: 5, r: 55 }
                    : { t: 30, b: 30, l: 30, r: 100 },
                showlegend: false,
                height: chartHeight,
                shapes: existingShapes,
                annotations,
                dragmode: mobile ? 'pan' : 'drawline',
                newshape: { line: { color: 'red', width: 2 } }
            };

            activeSubs.forEach((sub, i) => {
                const yKey = 'y' + (i + 2);
                const start = i * subH;
                layout['yaxis' + (i + 2)] = {
                    domain: [start, start + subH - 0.02],
                    side: 'right',
                    title: mobile ? '' : sub.toUpperCase(),
                    fixedrange: true,
                    tickfont: { size: mobile ? 8 : 10 }
                };
                if (sub === 'vol') {
                    traces.push({ x, y: hist.map(h => h.vol), type: 'bar', marker: { color: 'gray' }, yaxis: yKey });
                } else if (sub === 'macd') {
                    traces.push({ x, y: hist.map(h => h.macd),   line: { color: 'blue'   }, yaxis: yKey });
                    traces.push({ x, y: hist.map(h => h.macd_s), line: { color: 'orange' }, yaxis: yKey });
                } else if (sub === 'stoch') {
                    traces.push({ x, y: hist.map(h => h.st_k), line: { color: 'blue'   }, yaxis: yKey });
                    traces.push({ x, y: hist.map(h => h.st_d), line: { color: 'orange' }, yaxis: yKey });
                } else if (sub === 'rsi') {
                    traces.push({ x, y: hist.map(h => h.rsi),    line: { color: 'purple', width: 1.5 }, yaxis: yKey });
                    traces.push({ x, y: x.map(() => 70), line: { color: 'red',  dash: 'dot' }, yaxis: yKey });
                    traces.push({ x, y: x.map(() => 30), line: { color: 'blue', dash: 'dot' }, yaxis: yKey });
                } else if (sub === 'cci') {
                    traces.push({ x, y: hist.map(h => h.cci),    line: { color: 'darkgreen', width: 1.5 }, yaxis: yKey });
                    traces.push({ x, y: x.map(() =>  100), line: { color: 'gray', dash: 'dot' }, yaxis: yKey });
                    traces.push({ x, y: x.map(() => -100), line: { color: 'gray', dash: 'dot' }, yaxis: yKey });
                } else if (sub === 'adx') {
                    traces.push({ x, y: hist.map(h => h.adx), line: { color: 'black', width: 2 }, yaxis: yKey });
                }
            });

            Plotly.react('chart', traces, layout, {
                displaylogo: false,
                editable: !mobile,
                scrollZoom: true,
                modeBarButtonsToRemove: mobile ? ['toImage', 'sendDataToCloud'] : []
            });

            document.getElementById('money').innerText       = '$' + Math.floor(data.money).toLocaleString();
            document.getElementById('avg_price').innerText   = '$' + Math.floor(data.avg_price).toLocaleString();
            document.getElementById('shares').innerText      = data.shares.toLocaleString();
            document.getElementById('total_asset').innerText = '$' + Math.floor(data.total_asset).toLocaleString();
        }

        // 창 크기 변경 시 차트 높이 재조정
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                if (lastData) draw(lastData);
            }, 200);
        });

        // 초기화
        resetGame();
        fetchState();
    </script>
</body>
</html>
